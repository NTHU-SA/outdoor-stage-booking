sonar.projectKey=nthu-sa_outdoor-stage-booking
sonar.projectName=Outdoor Stage Booking
sonar.organization=nthu-sa

# Source settings
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx
sonar.exclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/__tests__/**,\
  src/components/ui/**,\
  node_modules/**,\
  .next/**,\
  coverage/**

# TypeScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions (same as vitest)
sonar.coverage.exclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/__tests__/**,\
  src/components/ui/**,\
  src/utils/supabase/client.ts,\
  src/utils/supabase/server.ts,\
  src/utils/supabase/service.ts,\
  src/utils/supabase/middleware.ts

# Encoding
sonar.sourceEncoding=UTF-8
